services:
  backend:
    build: .
    container_name: backend-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - elasticsearch
    networks:
      - prototype-network
  
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch-wolfi:9.3.1
    container_name: es01
    env_file:
      - .env
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    networks:
      - prototype-network

volumes:
  elastic_data:

networks:
  prototype-network:
    driver: bridge